name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ] # 或者是您的主分支名，如果是 master 请改为 master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 部署当前目录（即仓库根目录）的内容到 gh-pages 分支
